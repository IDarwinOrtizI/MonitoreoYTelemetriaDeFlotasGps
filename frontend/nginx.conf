# ============================================================
# nginx.conf - Sirve el frontend y hace proxy /api -> backend
# ============================================================
# NOTA IMPORTANTE sobre el rewrite de /api:
#   En desarrollo, vite.config.ts reescribe /api -> "" (lo ELIMINA).
#   Ej: GET /api/vehicles  ->  GET /vehicles
#   Por eso usamos "proxy_pass http://backend:8080/;" con la barra
#   final: nginx REEMPLAZA el prefijo /api/ por "/" antes de enviar
#   la peticion al backend. El backend recibe /vehicles (sin /api).

server {
    listen 80;
    server_name _;

    # Raiz de archivos estaticos del frontend (build de Vite)
    root /usr/share/nginx/html;
    index index.html;

    # ============================================================
    # Proxy reverso: /api/* -> http://backend:8080/*
    # (El "/" final en proxy_pass elimina el prefijo /api)
    # ============================================================
    location /api/ {
        proxy_pass http://backend:8080/;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts razonables para APIs
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ============================================================
    # SPA routing: cualquier ruta no encontrada cae en index.html
    # para que React Router (u otro) maneje el routing del cliente.
    # ============================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache basico para assets con hash (vite emite nombres tipo
    # assets/index-abc123.js). Esto mejora el rendimiento.
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health check interno (util para docker-compose si se agrega)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
